# cargo-deny config. Schema: https://embarkstudios.github.io/cargo-deny/
#
# Run with `cargo deny check` (part of the pre-release quality sweep;
# see SECURITY.md). Tighten as findings surface; this is a pragmatic
# baseline.

[graph]
all-features = true
# Cyphera Kernel only builds for x86_64-unknown-none; advisory/license/source
# scanning is target-agnostic, but pruning to the actual target avoids
# pulling in platform-specific transitive deps that don't apply.
targets = [
    { triple = "x86_64-unknown-none" },
]

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
# Allowlist. Common Rust-ecosystem permissive licenses.
# No GPL/AGPL/LGPL. Add to this list deliberately — never default-allow.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
