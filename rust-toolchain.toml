[toolchain]
# Nightly required for `abi_x86_interrupt` (IDT entry point ABI); the
# only alternative is hand-written naked-asm trampolines for every IDT
# vector. Nightly is used only where required, as here.
# Pinned for reproducibility.
channel = "nightly-2026-03-01"
components = ["rust-src", "clippy", "rustfmt", "llvm-tools-preview"]
targets = ["x86_64-unknown-none"]
profile = "minimal"
